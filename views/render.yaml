databases:
  - name: worldcup-enhanced-db
    plan: free
services:
  - type: web
    name: worldcup-enhanced-app
    runtime: node
    region: oregon
    buildCommand: "npm install"
    startCommand: "node app.js"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-enhanced-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      # Optional: define this in Render’s UI if you want to use a live‑score API
      - key: FOOTBALL_DATA_API_KEY
        sync: false
