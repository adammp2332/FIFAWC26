databases:
  - name: worldcup-db
    plan: free
services:
  - type: web
    name: worldcup-app
    runtime: node
    region: oregon
    buildCommand: "npm install"
    startCommand: "node app.js"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
